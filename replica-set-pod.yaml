apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rp-pod
  labels: 
    app: red-app
    env: dev
  namespace: dev
  annotations:
    myecr: "984912521466.dkr.ecr.ap-south-1.amazonaws.com/dev/red-app"
spec:
  minReadySeconds: 5s
  replica: 4
  selector:
    matchLabels: 
      app: red-app-pods
  template:
    metadata:
      name: podlevellabels
      labels:
        app: red-app-pods
    spec:
      containers:
        - name: redpage
          image: "984912521466.dkr.ecr.ap-south-1.amazonaws.com/dev/red-app:latest"
          ports:
            - name: red-app-port
              containerPort: 80
              protocol: TCP
          startupProbe:
            httpGet: 
              path: "/nikhil"
              port: 80
          livenessProbe:
            tcpSocket: 
              port: 80
          readinessProbe:
            exec:
              command: 
                - echo This is by using replica
                - touch replicafile
          resources:
            request:
              cpu: 100M
              memory: 150Mi
            limits:
              cpu: 200M
              memory: 200Mi